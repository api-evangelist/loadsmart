description: >-
  FOCUS-aligned FinOps definition for Loadsmart's commercial surface.
  Loadsmart monetizes through (a) per-load freight brokerage margins on
  shipments booked via the ShipperGuide platform, (b) SaaS subscriptions
  for ShipperGuide TMS, Opendock Nova, NavTrac, and CarrierGuide, and (c)
  managed-transportation (4PL) service fees. API access is bundled with
  those subscriptions rather than billed as a metered API product.
sources:
  - https://loadsmart.com/
  - https://developer.loadsmart.com/docs/
