chargeTypes:
  - name: Freight brokerage
    chargeCategory: Usage
    description: Per-load brokerage margin on shipments booked through ShipperGuide / api.loadsmart.com.
  - name: ShipperGuide TMS subscription
    chargeCategory: Subscription
    description: SaaS subscription including API access to api.loadsmart.com.
  - name: Opendock Nova subscription
    chargeCategory: Subscription
    description: SaaS subscription including Neutron REST API and Subspace WebSocket access.
  - name: NavTrac subscription
    chargeCategory: Subscription
    description: Yard-management and computer-vision asset-tracking subscription.
  - name: CarrierGuide / Factoring
    chargeCategory: Subscription
    description: Carrier-side subscription products and factoring fees.
  - name: Managed Transportation
    chargeCategory: Subscription
    description: 4PL service engagement fees.
notes: >-
  Loadsmart does not publish per-unit list prices or standardized FOCUS
  exports; this definition captures the commercial structure inferred from
  public product pages and the developer portal.
