      security:
      - bearer: []
    get:
      operationId: LoadTypeGroupController_getLoadTypeGroups
      summary: Retrieve load type groups
      description: Fetches all load type groups for a specific warehouse. Returns a list of groups with their associated load
        types, useful for displaying configuration options or managing unit limits.
      parameters: []
      responses:
        '200':
          description: List of load type groups for the specified warehouse
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResponseLoadTypeGroupDto'
      tags:
      - Load Type Groups
      - Unit Limiter
      security:
      - bearer: []
  /loadtype-group/{id}:
    patch:
      operationId: LoadTypeGroupController_updateLoadTypeGroup
      summary: Update an existing load type group
      description: Updates the name or load type membership of an existing load type group. This allows you to modify which
        load types are included in the group without recreating it.
      parameters:
      - name: id
        required: true
        in: path
        description: The unique identifier of the load type group to update
        schema:
          format: uuid
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLoadTypeGroupDto'
      responses:
        '200':
          description: Load type group successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseLoadTypeGroupDto'
      tags:
      - Load Type Groups
      - Unit Limiter
      security:
      - bearer: []
    delete:
      operationId: LoadTypeGroupController_deleteLoadTypeGroup
      summary: Delete a load type group
      description: Deletes a load type group. This removes the group itself but does not affect the individual load types
        that were part of the group. Any unit limits referencing this group will need to be reconfigured.
      parameters:
      - name: id
        required: true
        in: path
        description: The unique identifier of the load type group to delete
        schema:
          format: uuid
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteLoadTypeGroupDto'
      responses:
        '200':
          description: Load type group successfully deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
      tags:
      - Load Type Groups
      - Unit Limiter
      security:
      - bearer: []
  /unit-limit/configuration:
    post:
      operationId: UnitLimitController_setUpConfiguration
      summary: Create or update unit limit configuration
      description: Configures unit limits for a warehouse based on grouping criteria (warehouse, dock, load type, or load
        type group). Unit limits control how many appointment or handling units (pallets, etc.) can be scheduled within specific
        time periods. This helps manage warehouse capacity and prevent overbooking.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnitLimitConfigurationWriteDTO'
      responses:
        '200':
          description: Unit limit configuration successfully created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    example: 123e4567-e89b-12d3-a456-426614174000
      tags:
      - Unit Limiter
      security:
      - bearer: []
    get:
      operationId: UnitLimitController_getConfiguration
      summary: Retrieve unit limit configurations
      description: Fetches unit limit configurations based on specified filters such as warehouse, grouper type (dock, load
        type, or load type group), and unit type. Returns all matching configurations for the authenticated user's organization.
      parameters: []
      responses:
        '200':
          description: List of unit limit configurations matching the query parameters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnitLimit'
      tags:
      - Unit Limiter
      security:
      - bearer: []
  /unit-limit/count:
    get:
      operationId: UnitLimitController_getCount
      summary: Get unit limit counts for specific configurations
      description: Retrieves actual unit counts for specified unit limit configurations within a date range. This shows how
        many units have been scheduled against each limit, helping track capacity utilization.
      parameters: []
      responses:
        '200':
          description: List of unit counts for the requested unit limits and date range
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnitLimitCount'
      tags:
      - Unit Limiter
      security:
      - bearer: []
  /unit-limit/validate:
    post:
      operationId: UnitLimitController_validateUnitLimit
      summary: Validate if scheduling at a given time would breach unit limits
      description: Checks whether creating an appointment with the specified warehouse, dock, load type, and time interval
        would violate any configured unit limits. Returns an array of results for each day in the interval.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnitLimitValidateDTO'
      responses:
        '200':
          description: Unit limits validation results for each day in the requested interval
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    valid:
                      type: boolean
                      example: true
                    message:
                      type: string
                      example: Unit limits validation passed
                    date:
                      type: string
                      example: '2025-11-05'
      tags:
      - Unit Limiter
      security:
      - bearer: []
