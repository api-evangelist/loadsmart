  "/api/v2/shipments/{shipment_id}/action-logs":
    post:
      summary: Create shipment action log entry
      description: |
        Appends an action to the shipment's action log.
      security:
        - Application-JWT:
            - shipment_action_log
      parameters:
        - in: path
          name: shipment_id
          required: true
          schema:
            description: Shipment or Load UUID
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Request body to create a shipment action log entry. The `action` text is combined with the
                caller's client name when persisted.
              properties:
                action:
                  type: string
                  maxLength: 255
                  description: Action text to record for this shipment (max 255 characters).
              required:
                - action
            example:
              action: Manual gate check completed at pickup
      responses:
        "201":
          description: Action log entry was created
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
              example:
                error: forbiden_access
                error_description: An user is trying to access a not authorized resource.
        "404":
          description: Shipment not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
              example:
                error: object_not_found
                error_description: Object not found
        "422":
          description: |
            Shipment is not eligible for action logs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
              example:
                error: invalid_data
                error_description: Can't create the object
                errors:
                  field_name:
                    - This field is required.
                  other_field:
                    - Expected string but received integer.
      tags:
        - Shipments
  "/api/v2/shipments/{shipment_id}/stops/{stop_id}/confirm_appointment":
    put:
      summary: Confirm stop appointment
      tags:
        - Shipment Stops
      description: Confirm the time and date of the appointment for the stop
      security:
        - Application-JWT:
            - shipment_write
      parameters:
        - in: path
          name: shipment_id
          required: true
          schema:
            description: Shipment UUID
            type: string
            format: uuid
        - in: path
          name: stop_id
          required: true
          schema:
            description: Stop UUID
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed:
                  description: If it is confirmed
                  type: boolean
                window_start:
                  description: A datetime that represents the start of a time window for this appointment. In UTC time.
                  type: string
                  format: date-time
                window_end:
                  description: A datetime that represents the end of a time window for this appointment. In UTC time.
                  type: string
                  format: date-time
                scheduler_appt_id:
                  description: An ID that represents this appointment.
                  type: string
                  format: uuid
                confirmation_number:
                  description: A number that identifies this appointment.
                  type: string
                contact_name:
                  description: The contact name responsible for this appointment.
                  type: string
            example:
              confirmed: true
              window_start: 2020-02-14T08:00:00.000Z
              window_end: 2020-02-14T09:00:00.000Z
              scheduler_appt_id: 029a8462-a04e-4ad8-80d8-e6978db2fb55
              confirmation_number: 123456789
              contact_name: Joe Smith
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      confirmed:
                        description: If it is confirmed
                        type: boolean
                      window_start:
                        description: A datetime that represents the start of a time window for this appointment. In UTC time.
                        type: string
                        format: date-time
                      window_end:
                        description: A datetime that represents the end of a time window for this appointment. In UTC time.
                        type: string
                        format: date-time
                      scheduler_appt_id:
                        description: An ID that represents this appointment.
                        type: string
                        format: uuid
                      confirmation_number:
                        description: A number that identifies this appointment.
                        type: string
                      contact_name:
                        description: The contact name responsible for this appointment.
                        type: string
              example:
                confirmed: true
                window_start: 2020-02-14T08:00:00.000Z
                window_end: 2020-02-14T09:00:00.000Z
                scheduler_appt_id: 029a8462-a04e-4ad8-80d8-e6978db2fb55
                confirmation_number: 123456789
                contact_name: Joe Smith
        "404":
          description: Shipment or stop not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
              example:
                error: object_not_found
                error_description: Object not found
        "422":
          description: Payload is invalid and the confirmation can't be made
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
              example:
                error: invalid_data
                error_description: Can't create the object
                errors:
                  field_name:
                    - This field is required.
                  other_field:
                    - Expected string but received integer.
  /api/v2/shipment-documents:
    post:
      summary: Create shipment document
      description: Send a shipment document for audit it can be a proof of delivery, carrier invoice or any other document.
      tags:
        - Shipments
      security:
        - User-JWT:
            - submitted_shipment_document_write
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                shipment:
                  type: string
                  description: The shipment UUID or Loadsmart ref number.
                file_obj:
                  type: binary
                  description: The shipment pdf file.
                file_name:
                  type: string
                  description: The file name.
                type:
                  type: string
                  description: The file type.
                  enum:
                    - carrier-invoice
                    - proof-of-delivery
                    - other
              required:
                - shipment
                - file_obj
                - file_name
                - type
            example:
              shipment: ac483d72-83c5-41cd-97bf-ce94517e7bc5
              file_obj: (binary)
              file_name: 9444666.pdf
              type: carrier-invoice
      responses:
        "201":
          description: Shipment document successfully created.
        "403":
          description: Logged carrier is incorrect.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
              example:
                error: forbiden_access
                error_description: An user is trying to access a not authorized resource.
        "422":
          description: Payload is invalid and the document wasn't created for the shipment
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
              example:
                error: invalid_data
                error_description: Can't create the object
                errors:
                  field_name:
                    - This field is required.
                  other_field:
                    - Expected string but received integer.
  "/api/v2/shipment-documents/?shipment=${shipment}":
    get:
      summary: List shipment documents
