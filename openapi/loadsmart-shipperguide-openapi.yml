                              type: string
                              maxLength: 64
                              description: Reference for the asset carrier quote.
                            expires_at:
                              type: datetime
                            status:
                              enum:
                                - pending
                                - available
                                - rejected
                            shipment_mode:
                              type: array
                              items:
                                type: string
                                default: FTL
                                enum:
                                  - FTL
                                  - LTL
                                  - PTL
                                  - RAIL
                                description: |
                                  The transportation mode of the load. Allowed values are:
                                  - FTL: Full Truckload
                                  - LTL: Less-than-Truckload
                                  - PTL: Partial Truckload
                                  - RAIL: Intermodal rail (53' containers)
                            customer_reference:
                              type: string
                              maxLength: 255
                              description: Internal client's reference, such as an ID, of the quote
                            service_level:
                              type: string
                              maxLength: 255
                              description: A guarantee given by the carrier of deliverying the load on the specified time. Often a higher service level means a higher price
                            carriers:
                              type: array
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  uuid:
                                    type: string
                                    format: uuid
                                  priority:
                                    type: string
                                    enum:
                                      - favorited
                                      - restricted
                                      - neutral
                                  scac:
                                    type: string
                                    maxLength: 4
                                    description: Standard Carrier Alpha Code (for `LTL`/`VLTL` quotes only)
                            price:
                              type: object
                              properties:
                                total:
                                  type: number
                                components:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      type:
                                        type: string
