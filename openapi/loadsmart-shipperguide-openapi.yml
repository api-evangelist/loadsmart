          application/json:
            schema:
              allOf:
                - type: object
                  properties:
                    type:
                      type: string
                      description: Event type
                      enum:
                        - shipment:en-route-to-pickup
                        - shipment:check-in-pickup
                        - shipment:check-out-pickup
                        - shipment:check-in-delivery
                        - shipment:check-out-delivery
