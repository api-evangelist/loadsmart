    post:
      summary: Create shipment event
      description: When moving the load always start the flow with the shipment:en-route-to-pickup event.
      security:
        - User-JWT:
            - shipment_write
      parameters:
        - in: path
          name: shipment_id
          required: true
          schema:
            description: Shipment UUID
            type: string
            format: uuid
      requestBody:
