  "/api/v2/shipments/{shipment_id}":
    delete:
      summary: Cancel a shipment
      tags:
        - Shipments
      security:
        - User-JWT:
            - shipment_write
      responses:
        "204":
          description: Shipment was canceled
        "404":
          description: Shipment not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
              example:
                error: object_not_found
                error_description: Object not found
    get:
      summary: Retrieve details from a shipment
      tags:
        - Shipments
      security:
        - User-JWT:
            - shipment_read
      parameters: []
      responses:
        "200":
          description: Shipment was found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: Unique identifier for this shipment
                    readOnly: true
                  ref_number:
                    type: string
                    maxLength: 255
                    description: Internal client's reference, such as an ID, of the load
                  bol_number:
                    type: string
                    maxLength: 255
                    description: The bill of lading number
                  purchase_order_numbers:
                    type: array
                    description: Purchase Orders (PO numbers) associated with this shipment.
                    items:
                      type: string
                  stops:
                    type: array
                    description: Points of interest where the truck makes a stop to either pickup or deliver a shipment. Usually a load has one pickup stop and one delivery stop, but in some cases there will be multiple delivery stops.
                    items:
                      type: object
                      properties:
                        stop_index:
                          type: number
                          description: Indicate the stop number for this event, being 0-based for pickup.
                        address:
                          type: string
                        city:
                          type: string
                        state:
                          type: string
                        zipcode:
                          type: string
                    minItems: 2
                  requirements:
                    type: object
                    description: Requirements that needs to be fulfilled in order to transport the load
                    properties:
                      hazmat:
                        type: boolean
                        description: The commodity being moved consists of hazard material
                      tarp:
                        type: object
                        description: If present in 'requirements', it means the shipment needs a tarp
                        properties:
                          size:
                            type: number
                            format: float
                            minimum: 0
                            description: size in expressed in 'ft'
                          type:
                            type: string
                            enum:
                              - lumber
                              - steel
                              - smoke
                              - parachute
                              - machinery
                              - canvas
                              - hay
                              - poly
                        required:
                          - size
                      dunnage:
                        type: boolean
                        description: Extra rack added to the truck
                      beer:
                        type: boolean
                        description: The carrier must be able to transport alcohool
                      teams:
                        type: boolean
                        description: If it requires a team of drivers
              example:
                data:
                  bol_number: "31871465"
                  ref_number: "24577100"
                  purchase_order_numbers:
                    - abc123
                    - 321cba
                  stops:
                    - address: 2814 S SECOND ST
                      city: St. Louis
                      stop_index: 0
                      state: MO
                      zipcode: "63118"
                    - address: 825 STONE AVE
                      city: Monroe
                      stop_index: 1
                      state: LA
                      zipcode: "71201"
                  requirements:
                    hazmat: false
                    beer: false
                    dunnage: true
                    tarp:
                      size: 10
                      type: lumber
                  id: 2d490b57-6c77-4ee7-8d14-cb9d8d89923d
        "404":
          description: Shipment not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
              example:
                error: object_not_found
                error_description: Object not found
