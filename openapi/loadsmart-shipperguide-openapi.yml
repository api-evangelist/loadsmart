          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Unique Identifier of the Integration Request
                  account_id:
                    type: string
                    description: Unique Identifier of the Account
                  carrier:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Unique Identifier of the Carrier on Loadsmart
                      mc:
                        type: string
                        description: Carrier Interstate Operating Authority (MC number)
                      dot:
                        type: string
                        description: Carrier US DOT Number
                      name:
                        type: string
                        description: Carrier legal name
                      eligible:
                        type: bool
                        description: Flag that report if the Carrier is eligible to carry loads
                      status:
                        type: string
                        enum:
                          - New
                          - Pending
                          - Ready
                          - Inactive
                        description: Carrier status on Loadsmart
                  status:
                    type: string
                    enum:
                      - pending
                      - accepted
                      - rejected
                    description: |
                      Status of the Integration Request
                      - pending: waiting/under evaluation from Carrier owner and/or Loadsmart
                      - accepted: Integration Request accepted
                      - rejected: Integration Request rejected by Carrier owner and/or Loadsmart
                  documents:
                    type: array
                    description: List of required documents and its status
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          description: Document type (Form W9, Insurance or Authority)
                        status:
                          type: string
                          enum:
                            - missing
                            - under-review
                            - accepted
              example:
                id: fe17b7e7-6453-4520-b99d-2d2b44972468
                account_id: bc32c4d4-5732-7845-aa32-132cdab5467b
                carrier:
                  id: 9f87d040-f843-42e7-887a-45bea55e76f3
                  mc: "12345"
                  dot: "54321"
                  name: John Doe Freights
                  status: new
                  eligible: false
                status: PENDING
                documents:
                  - type: w9
                    status: missing
                  - type: insurance
                    status: under-review
                  - type: authority
                    status: accepted
        "404":
          description: Integrate Request not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
              example:
                error: object_not_found
                error_description: Object not found
      tags:
        - Carrier
  /api/v2/carrier/documents:
    post:
      summary: Upload document
      description: Uploads Carrier related documents, such as Form W9, Insurance and
      security:
        - User-JWT:
            - carrier_write
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document_type:
                  type: string
                  enum:
                    - w9
                    - insurance
                    - authority
                  description: |
                    Type of document:
                    `w9`: Form W9
                    `insurance`: Certificate of Insurance
                    `authority`: Letter of Authority
                document:
                  type: string
                  format: binary
      responses:
        "200":
          description: File successfully uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  document_url:
                    type: string
                    description: File URL
                  type:
                    type: string
                    enum:
                      - w9
                      - insurance
                      - authority
                    description: |
                      Type of document:
                      `w9`: Form W9
                      `insurance`: Certificate of Insurance
                      `authority`: Letter of Authority
                  verified:
                    type: boolean
                    description: File has been verified
        "422":
          description: Invalid or missing data
          content:
            application/json:
              schema:
