  /api/v2/load-offers/offers:
    get:
      summary: Search offers
      tags:
        - Load Offers
      security:
        - Application-JWT:
            - load_offers_read
      description: |
        Search offers
      parameters:
        - in: query
          name: alcohol
          schema:
            description: Show only loads that have/don't have alcoholic commodity (shows all loads if not informed)
            type: string
            format: boolean
          required: false
        - in: query
          name: equipment_type
          schema:
            description: |
              The type of truck used to transport the load:
               * `DRV` - Dry van
               * `FBE` - Flatbed
               * `RFR` - Reefer
               * `CON` - Conestoga
               * `CUR` - Curtainside
               * `DDP` - Double drop
               * `IMC` - Intermodal
               * `SDK` - Step deck
               * `STK` - Straight truck
               * `LTL` - Less than truckload
               * `BLK` - Bulk
               * `TNK` - Tanker
               * `OTH` - Others

              Repeat the query string in order to search for multiple types at the same time, e.g: `?equipment_type=DRV&equipment_type=FBE`
            type: string
            enum:
              - DRV
              - FBE
              - RFR
              - CON
              - CUR
              - DDP
              - IMC
              - SDK
              - STK
              - LTL
              - BLK
              - TNK
              - OTH
          required: false
        - in: query
          name: start_date
          schema:
            description: Date
            type: string
            format: YYYY-MM-DD
          required: false
        - in: query
          name: end_date
          schema:
            description: Date
            type: string
            format: YYYY-MM-DD
          required: false
        - in: query
          name: origin_lat
          schema:
            description: Origin latitude
            type: number
          required: false
        - in: query
          name: origin_lon
          schema:
            description: Origin longitude
            type: number
          required: false
        - in: query
          name: origin_radius
          schema:
            description: Radius for origin field (Miles)
            type: number
            format: integer
          required: false
        - in: query
          name: destination_lat
          schema:
            description: Destination latitude
            type: number
          required: false
        - in: query
          name: destination_lon
          schema:
            description: Destination longitude
            type: number
          required: false
        - in: query
          name: destination_radius
          schema:
            description: Radius for destitation field (Miles)
            type: number
            format: integer
          required: false
        - in: query
          name: mc
          schema:
            description: Carrier's MC number
            type: string
          required: false
        - in: query
          name: dot
          schema:
            description: Carrier's DOT number
            type: string
          required: false
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    description: Number of objects found
                    type: number
                    format: integer
                  next:
                    description: URL for next page of results
                    type: string
                    format: url
                  previous:
                    description: URL for previous page of results
                    type: string
                    format: url
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Offer unique identifier (UUID)
                        price:
                          type: number
                          description: Offer price (USD)
                        load:
                          type: object
                          properties:
                            equipment_type:
                              type: string
                              enum:
                                - DRV
                                - FBE
                                - RFR
                                - CON
                                - CUR
                                - DDP
                                - IMC
                                - SDK
                                - STK
                                - LTL
                                - BLK
                                - TNK
                                - OTH
                              description: The type of truck used to transport the load. Allowed values are DRV (dry van), FBE (flatbed), RFR (reefer), CON (conestoga), CUR (curtainside), DDP (double drop), IMC (intermodal), SDK (step deck), STK (straight truck), LTL (less than truckload), BLK (bulk), TNK (tanker) and OTH for others.
                            commodity:
                              type: string
                              maxLength: 255
                              description: Name or description of the commodity that is being shipped.
                            weight:
                              type: number
                              minimum: 1
                              description: Weight of the cargo in pounds (lbs).
                            dimensions:
                              type: object
                              description: |
                                Dimensions of the cargo in feet (ft).
                                A `null` dimension means that the information is unavailable.
                              properties:
                                weight:
                                  type: number
                                  nullable: true
                                height:
                                  type: number
                                  nullable: true
                                width:
                                  type: number
                                  nullable: true
                            distance:
                              type: number
                              minimum: 1
                              description: Total distance of the shipment, in miles. This counts all stops.
                            stops:
                              type: array
                              items:
                                type: object
                                properties:
                                  type:
                                    type: string
                                    enum:
                                      - PU
                                      - DEL
                                    description: Type of the stop. Pickup (PU) or Delivery (DEL).
                                  address:
                                    type: string
                                  city:
                                    type: string
                                  state:
                                    type: string
                                    pattern: ^[A-Z0-9]{1,3}$
                                    description: |
                                      Up to 3-alphanumeric characters representing state or equivalent administrative boundary,
                                      from the second part of ISO 3166-2 code definition.
                                      For example, Florida is FL, since its ISO 3166-2 is US-FL.
                                  country:
                                    type: string
                                    pattern: ^[A-Z]{3}$
                                    description: 3 letter country code (ISO-3166-1 alpha3).
                                  latitude:
                                    type: number
                                    description: Latitude coordinate of the stop
                                  longitude:
                                    type: number
                                    description: Longitude coordinate of the stop
                                  zipcode:
                                    type: string
                                    description: Zipcode of the stop (first five digits)
                                  window_start:
                                    type: string
                                    format: naive date-time
                                    description: A datetime that represents the start of a time window for this stop (pickup or delivery). In local time.
                                  window_end:
                                    type: string
                                    format: naive date-time
                                    description: A datetime that represents the start of a time window for this stop (pickup or delivery). In local time.
                                  window_timezone:
                                    type: string
                                    description: A timezone identifier for the stop.
                                  requirements:
                                    type: array
                                    description: |
                                      A list of requirements for the Stop, such as drop_trailer, etc.
                                  facility_info:
                                    type: object
                                    description: Detention rate and average waiting time on the facility
                                    properties:
                                      avg_time_spent:
                                        type: object
                                        description: Average waiting on facility
                                        properties:
                                          pickup:
                                            type: number
                                            description: Average waiting time in minutes for pickup
                                          delivery:
                                            type: number
                                            description: Average waiting time in minutes for delivery
                                      detention_rate:
                                        type: number
                                        description: Facility detention rate (0 to 100)
                            requirements:
                              type: object
                              description: |
                                Requirements for the load
                              properties:
                                beer:
                                  type: boolean
                                chemicals:
                                  type: boolean
                                ctpat:
                                  type: boolean
                                food_grade:
                                  type: boolean
                                frozen:
                                  type: boolean
                                hazmat:
                                  type: boolean
                                hvhr:
                                  type: boolean
                                pharmaceuticals:
                                  type: boolean
                                produce:
                                  type: boolean
                                teams:
                                  type: boolean
                                tsa:
                                  type: boolean
                                twic:
                                  type: boolean
                                vented_vans:
                                  type: boolean
                            ref_number:
                              type: string
                              description: Human readable Load reference number.
                          required:
                            - ref_number
                            - equipment_type
                        actions:
                          type: object
                          properties:
                            redirect_url:
                              type: string
                              description: URL of offer on Loadsmart website.
                            accept_url:
                              type: string
                              description: URL to accept the offer via API (must be a POST method).
              example:
                count: 2
                next: null
                previous: null
                results:
                  - id: ccd37107-ebe7-4a60-a20f-01d4e74355c8
                    price: 1234.56
                    load:
                      equipment_type: DRV
