  "/api/v2/load-offers/offers/{offer_id}/accept":
    post:
      summary: Accept an offer
      tags:
        - Load Offers
      security:
        - User-JWT:
            - load_offers_write
      description: |
        Accept an Offer for a Carrier
      parameters:
        - in: path
          name: offer_id
          schema:
            description: Offer UUID
            type: string
            format: uuid
          required: true
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                properties:
                  id:
                    type: string
                    description: Load unique identifier (UUID)
              example:
                id: 2ed37107-ebe7-4a60-a20f-01d4e74355c8
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
        "404":
          description: Offer not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
              example:
                error: object_not_found
                error_description: Object not found
        "410":
          description: Offer no longer available
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
        "412":
          description: Carrier is not eligible to move the Load
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_data
                  error_description:
                    type: string
                    description: Description of what happened
                  errors:
                    type: object
                    description: Object where each field is a key and the value is an array of errors
                required:
                  - error
                  - error_description
  "/api/v2/load-offers/offers/{offer_id}/related":
    get:
      summary: Search related offers
      tags:
        - Load Offers
      security:
        - Application-JWT:
            - load_offers_read
      description: |
        Search related offers of another offer
      parameters:
        - in: path
          name: offer_id
          required: true
          schema:
            description: Offer UUID
            type: string
            format: uuid
        - in: query
          name: relation
          required: false
          schema:
            description: |
              Relation type with the Offer.
              Possible values `backhaul`, `similar_lane`, `similar_pickup`, `similar_delivery` or `from_delivery`
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    description: Number of objects found
                    type: number
                    format: integer
                  next:
                    description: URL for next page of results
                    type: string
                    format: url
                  previous:
                    description: URL for previous page of results
                    type: string
                    format: url
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Offer unique identifier (UUID)
                        price:
                          type: number
                          description: Offer price (USD)
                        relation:
                          type: string
                          description: |
                            Relation type with the Offer.
                            Possible values `backhaul`, `similar_lane`, `similar_pickup`, `similar_delivery` or `from_delivery`
                        load:
                          type: object
                          properties:
                            equipment_type:
                              type: string
                              enum:
                                - DRV
                                - FBE
                                - RFR
                                - CON
                                - CUR
                                - DDP
                                - IMC
                                - SDK
                                - STK
                                - LTL
                                - BLK
                                - TNK
                                - OTH
                              description: The type of truck used to transport the load. Allowed values are DRV (dry van), FBE (flatbed), RFR (reefer), CON (conestoga), CUR (curtainside), DDP (double drop), IMC (intermodal), SDK (step deck), STK (straight truck), LTL (less than truckload), BLK (bulk), TNK (tanker) and OTH for others.
                            commodity:
                              type: string
                              maxLength: 255
                              description: Name or description of the commodity that is being shipped.
                            weight:
                              type: number
                              minimum: 1
                              description: Weight of the cargo in pounds (lbs).
                            dimensions:
                              type: object
                              description: |
                                Dimensions of the cargo in feet (ft).
                                A `null` dimension means that the information is unavailable.
                              properties:
                                weight:
                                  type: number
                                  nullable: true
                                height:
                                  type: number
                                  nullable: true
                                width:
                                  type: number
                                  nullable: true
                            distance:
                              type: number
                              minimum: 1
                              description: Total distance of the shipment, in miles. This counts all stops.
                            stops:
                              type: array
                              items:
                                type: object
                                properties:
                                  type:
                                    type: string
                                    enum:
                                      - PU
                                      - DEL
                                    description: Type of the stop. Pickup (PU) or Delivery (DEL).
                                  address:
                                    type: string
                                  city:
                                    type: string
                                  state:
                                    type: string
                                    pattern: ^[A-Z0-9]{1,3}$
                                    description: |
                                      Up to 3-alphanumeric characters representing state or equivalent administrative boundary,
                                      from the second part of ISO 3166-2 code definition.
                                      For example, Florida is FL, since its ISO 3166-2 is US-FL.
                                  country:
                                    type: string
                                    pattern: ^[A-Z]{3}$
                                    description: 3 letter country code (ISO-3166-1 alpha3).
                                  latitude:
                                    type: number
                                    description: Latitude coordinate of the stop
                                  longitude:
                                    type: number
                                    description: Longitude coordinate of the stop
                                  zipcode:
                                    type: string
                                    description: Zipcode of the stop (first five digits)
                                  window_start:
                                    type: string
                                    format: naive date-time
                                    description: A datetime that represents the start of a time window for this stop (pickup or delivery). In local time.
                                  window_end:
                                    type: string
                                    format: naive date-time
                                    description: A datetime that represents the start of a time window for this stop (pickup or delivery). In local time.
                                  window_timezone:
                                    type: string
                                    description: A timezone identifier for the stop.
                                  requirements:
                                    type: array
                                    description: |
                                      A list of requirements for the Stop, such as drop_trailer, etc.
                                  facility_info:
                                    type: object
                                    description: Detention rate and average waiting time on the facility
                                    properties:
                                      avg_time_spent:
                                        type: object
                                        description: Average waiting on facility
                                        properties:
                                          pickup:
                                            type: number
                                            description: Average waiting time in minutes for pickup
                                          delivery:
                                            type: number
                                            description: Average waiting time in minutes for delivery
                                      detention_rate:
                                        type: number
                                        description: Facility detention rate (0 to 100)
                            requirements:
                              type: object
                              description: |
                                Requirements for the load
                              properties:
                                beer:
                                  type: boolean
                                chemicals:
                                  type: boolean
                                ctpat:
                                  type: boolean
                                food_grade:
                                  type: boolean
                                frozen:
                                  type: boolean
                                hazmat:
                                  type: boolean
                                hvhr:
                                  type: boolean
                                pharmaceuticals:
                                  type: boolean
                                produce:
                                  type: boolean
                                teams:
                                  type: boolean
                                tsa:
                                  type: boolean
                                twic:
                                  type: boolean
                                vented_vans:
                                  type: boolean
                            ref_number:
                              type: string
                              description: Human readable Load reference number.
                          required:
                            - ref_number
